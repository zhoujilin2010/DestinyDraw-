<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 设置页面标题为“彩票摇号助手” -->
    <title>彩票摇号助手</title>
    <!-- 引入样式表 -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- 创建一个主标题，内容是“在线彩票摇号助手” -->
        <h1>在线彩票摇号助手</h1>

        <div class="button-group">
            <!-- 创建一个大乐透按钮 -->
            <button id="dalietouBtn">大乐透</button>
            <!-- 创建一个双色球按钮 -->
            <button id="shuangseqiuBtn">双色球</button>
        </div>

        <!-- 创建一个显示彩票号码的区域 -->
        <div id="lotteryDisplay" class="lottery-display">
            <!-- 摇号结果将显示在这里 -->
        </div>
    </div>

    <!-- 引入JavaScript脚本 -->
    <script src="script.js"></script>
</body>
</html>
