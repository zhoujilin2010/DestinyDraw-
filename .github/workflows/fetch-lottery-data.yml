name: Fetch Lottery Data

on:
  schedule:
    # 每天北京时间 01:00 运行 (UTC 17:00)
    - cron: '0 17 * * *'
  # 允许手动触发
  workflow_dispatch:

jobs:
  fetch:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch lottery data
        shell: pwsh
        run: .\scripts\fetch-data.ps1

      - name: Commit and push data files
        shell: bash
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet && echo "No changes" || (git commit -m "chore: update lottery data [skip ci]" && git push)
